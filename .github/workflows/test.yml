name: "Tests"

on: [push, pull_request]

jobs:

  smoke-test-help:
    name: "Smoke Test --help"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
        is-python-version-unreleased: [false]
        include:
          - python-version: "3.15.0-alpha.7"
            is-python-version-unreleased: true
    steps:
      - name: "Checkout"
        uses: actions/checkout@v6
      - name: "Set up environment"
        uses: ./.github/actions/setup-uv-env
        with:
          python-version: ${{ matrix.python-version }}
          uv-sync-args: "--python ${{ matrix.python-version }} --locked"
      - name: "Run `kannushi --help`"
        run: kannushi --help
        continue-on-error: ${{ matrix.is-python-version-unreleased }}
